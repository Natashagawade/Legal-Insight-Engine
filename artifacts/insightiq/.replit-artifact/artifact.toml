kind = "web"
previewPath = "/"
title = "InsightIQ"
version = "1.0.0"
id = "artifacts/insightiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19410
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/insightiq run dev"

[services.env]
PORT = "19410"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/insightiq", "run", "build"]
publicDir = "artifacts/insightiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
